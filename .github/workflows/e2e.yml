name: E2E CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Run pipeline up to environment:'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

jobs:
  test-dev:
    name: DEV Environment Tests
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Cache Playwright browsers
        id: pw-cache-dev
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        if: steps.pw-cache-dev.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        if: steps.pw-cache-dev.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests on DEV (@sanity)
        run: npx playwright test --grep @sanity
        env:
          ENV: dev
          BASE_URL: ${{ secrets.BASE_URL }}
          APPUSERNAME: ${{ secrets.APPUSERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GRANT_TYPE: ${{ secrets.GRANT_TYPE }}

      - name: Generate Allure Report
        if: always()
        run: npm run allure:generate

      - name: Upload DEV HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-playwright-html-report
          path: reports/html-report/
          retention-days: 14

      - name: Upload DEV Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-playwright-allure-report
          path: allure-report/
          retention-days: 14

  test-qa:
    name: QA Environment Tests
    needs: test-dev
    if: github.event.inputs.environment == 'qa' || github.event.inputs.environment == 'stage' || github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Cache Playwright browsers
        id: pw-cache-qa
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        if: steps.pw-cache-qa.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        if: steps.pw-cache-qa.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests on QA (All Tests)
        run: npx playwright test
        env:
          ENV: qa
          BASE_URL: ${{ secrets.BASE_URL }}
          APPUSERNAME: ${{ secrets.APPUSERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GRANT_TYPE: ${{ secrets.GRANT_TYPE }}

      - name: Generate Allure Report
        if: always()
        run: npm run allure:generate

      - name: Upload QA HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-playwright-html-report
          path: reports/html-report/
          retention-days: 14

      - name: Upload QA Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-playwright-allure-report
          path: allure-report/
          retention-days: 14

  test-stage:
    name: STAGE Environment Tests
    needs: test-qa
    if: github.event.inputs.environment == 'stage' || github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Cache Playwright browsers
        id: pw-cache-stage
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        if: steps.pw-cache-stage.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        if: steps.pw-cache-stage.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests on STAGE (@regression)
        run: npx playwright test --grep @regression
        env:
          ENV: stage
          BASE_URL: ${{ secrets.BASE_URL }}
          APPUSERNAME: ${{ secrets.APPUSERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GRANT_TYPE: ${{ secrets.GRANT_TYPE }}

      - name: Generate Allure Report
        if: always()
        run: npm run allure:generate

      - name: Upload STAGE HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-playwright-html-report
          path: reports/html-report/
          retention-days: 14

      - name: Upload STAGE Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-playwright-allure-report
          path: allure-report/
          retention-days: 14

  test-prod:
    name: PROD Environment Tests
    needs: test-stage
    if: github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Cache Playwright browsers
        id: pw-cache-prod
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        if: steps.pw-cache-prod.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        if: steps.pw-cache-prod.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests on PROD (@smoke)
        run: npx playwright test --grep @smoke
        env:
          ENV: prod
          BASE_URL: ${{ secrets.BASE_URL }}
          APPUSERNAME: ${{ secrets.APPUSERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GRANT_TYPE: ${{ secrets.GRANT_TYPE }}

      - name: Generate Allure Report
        if: always()
        run: npm run allure:generate

      - name: Upload PROD HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-playwright-html-report
          path: reports/html-report/
          retention-days: 14

      - name: Upload PROD Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-playwright-allure-report
          path: allure-report/
          retention-days: 14

  notify:
    name: Publish Reports + Notify
    needs: [test-dev, test-qa, test-stage, test-prod]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: write
    steps:
      - name: Set Status Emoji
        id: status
        run: |
          DEV="${{ needs.test-dev.result }}"
          QA="${{ needs.test-qa.result }}"
          STAGE="${{ needs.test-stage.result }}"
          PROD="${{ needs.test-prod.result }}"

          get_emoji() { if [ "$1" = "success" ]; then echo "✅"; elif [ "$1" = "skipped" ]; then echo "⏭️"; else echo "❌"; fi; }

          echo "dev=$(get_emoji $DEV)" >> $GITHUB_OUTPUT
          echo "qa=$(get_emoji $QA)" >> $GITHUB_OUTPUT
          echo "stage=$(get_emoji $STAGE)" >> $GITHUB_OUTPUT
          echo "prod=$(get_emoji $PROD)" >> $GITHUB_OUTPUT

          if ([ "$DEV" = "success" ] || [ "$DEV" = "skipped" ]) && \
             ([ "$QA" = "success" ] || [ "$QA" = "skipped" ]) && \
             ([ "$STAGE" = "success" ] || [ "$STAGE" = "skipped" ]) && \
             ([ "$PROD" = "success" ] || [ "$PROD" = "skipped" ]) && \
             ([ "$DEV" = "success" ] || [ "$QA" = "success" ] || [ "$STAGE" = "success" ] || [ "$PROD" = "success" ]); then
            echo "overall=✅ ALL PASSED" >> $GITHUB_OUTPUT
          else
            echo "overall=❌ SOME FAILURES" >> $GITHUB_OUTPUT
          fi

          REPORT_BASE="https://onkarundale26.github.io/playwright-antigravity/runs/${{ github.run_id }}"
          echo "report_url=${REPORT_BASE}" >> $GITHUB_OUTPUT

      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Organize Reports for GitHub Pages
        run: |
          mkdir -p pages-deploy/runs/${{ github.run_id }}

          # Create index page for this run
          cat > pages-deploy/runs/${{ github.run_id }}/index.html << 'INDEXPAGE'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Pipeline Reports — Run RUN_ID</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 0; padding: 40px; background: #f5f5f5; }
              .container { max-width: 800px; margin: 0 auto; }
              h1 { color: #1a1a2e; }
              .card { background: white; border-radius: 12px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
              .card h2 { margin-top: 0; color: #333; }
              .links { display: flex; gap: 12px; flex-wrap: wrap; }
              .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 14px; }
              .html-btn { background: #1a1a2e; }
              .allure-btn { background: #28a745; }
              .meta { color: #666; font-size: 14px; margin-bottom: 24px; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🎭 Pipeline Reports</h1>
              <p class="meta">Run ID: RUN_ID | Branch: BRANCH | Date: RUN_DATE</p>

              <div class="card">
                <h2>🟢 DEV — Sanity</h2>
                <div class="links">
                  <a class="btn html-btn" href="dev-html/index.html">📊 HTML Report</a>
                  <a class="btn allure-btn" href="dev-allure/index.html">📈 Allure Report</a>
                </div>
              </div>

              <div class="card">
                <h2>🔵 QA — All Tests</h2>
                <div class="links">
                  <a class="btn html-btn" href="qa-html/index.html">📊 HTML Report</a>
                  <a class="btn allure-btn" href="qa-allure/index.html">📈 Allure Report</a>
                </div>
              </div>

              <div class="card">
                <h2>🟡 STAGE — Regression</h2>
                <div class="links">
                  <a class="btn html-btn" href="stage-html/index.html">📊 HTML Report</a>
                  <a class="btn allure-btn" href="stage-allure/index.html">📈 Allure Report</a>
                </div>
              </div>

              <div class="card">
                <h2>🔴 PROD — Smoke</h2>
                <div class="links">
                  <a class="btn html-btn" href="prod-html/index.html">📊 HTML Report</a>
                  <a class="btn allure-btn" href="prod-allure/index.html">📈 Allure Report</a>
                </div>
              </div>
            </div>
          </body>
          </html>
          INDEXPAGE

          sed -i "s|RUN_ID|${{ github.run_id }}|g" pages-deploy/runs/${{ github.run_id }}/index.html
          sed -i "s|BRANCH|${{ github.ref_name }}|g" pages-deploy/runs/${{ github.run_id }}/index.html
          sed -i "s|RUN_DATE|$(date +'%d %b %Y, %I:%M %p UTC')|g" pages-deploy/runs/${{ github.run_id }}/index.html

          # Copy reports into organized folders
          cp -r all-reports/dev-playwright-html-report/ pages-deploy/runs/${{ github.run_id }}/dev-html/ 2>/dev/null || true
          cp -r all-reports/dev-playwright-allure-report/ pages-deploy/runs/${{ github.run_id }}/dev-allure/ 2>/dev/null || true
          cp -r all-reports/qa-playwright-html-report/ pages-deploy/runs/${{ github.run_id }}/qa-html/ 2>/dev/null || true
          cp -r all-reports/qa-playwright-allure-report/ pages-deploy/runs/${{ github.run_id }}/qa-allure/ 2>/dev/null || true
          cp -r all-reports/stage-playwright-html-report/ pages-deploy/runs/${{ github.run_id }}/stage-html/ 2>/dev/null || true
          cp -r all-reports/stage-playwright-allure-report/ pages-deploy/runs/${{ github.run_id }}/stage-allure/ 2>/dev/null || true
          cp -r all-reports/prod-playwright-html-report/ pages-deploy/runs/${{ github.run_id }}/prod-html/ 2>/dev/null || true
          cp -r all-reports/prod-playwright-allure-report/ pages-deploy/runs/${{ github.run_id }}/prod-allure/ 2>/dev/null || true

          echo "Reports organized ✅"
          ls -la pages-deploy/runs/${{ github.run_id }}/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages-deploy
          keep_files: true

      - name: Create HTML Dashboard for Email
        run: |
          REPORT_URL="${{ steps.status.outputs.report_url }}"

          cat > dashboard.html << DASHBOARD
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
              .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
              .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 30px; text-align: center; }
              .header h1 { margin: 0; font-size: 24px; }
              .header p { margin: 8px 0 0; opacity: 0.8; font-size: 14px; }
              .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 12px; }
              .pass { background: #28a745; color: white; }
              .fail { background: #dc3545; color: white; }
              .body { padding: 24px; }
              table { width: 100%; border-collapse: collapse; margin: 16px 0; }
              th { background: #f8f9fa; text-align: left; padding: 12px 16px; font-size: 13px; color: #666; text-transform: uppercase; }
              td { padding: 14px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
              .env-name { font-weight: 600; color: #1a1a2e; }
              .test-type { color: #666; font-size: 13px; }
              .status { font-size: 16px; text-align: center; }
              .reports { background: #f8f9fa; padding: 20px 24px; border-top: 1px solid #eee; }
              .reports h3 { margin: 0 0 12px; font-size: 16px; color: #333; }
              .report-link { display: inline-block; padding: 10px 20px; background: #1a1a2e; color: white; text-decoration: none; border-radius: 6px; margin: 4px; font-size: 13px; }
              .report-link.green { background: #28a745; }
              .footer { text-align: center; padding: 16px; color: #999; font-size: 12px; border-top: 1px solid #eee; }
              .meta { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 13px; color: #666; }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="header">
                <h1>🎭 Playwright CI/CD Dashboard</h1>
                <p>Pipeline Report</p>
              </div>
              <div class="body">
                <div class="meta">
                  <span>🔀 Branch: <strong>${{ github.ref_name }}</strong></span>
                  <span>👤 ${{ github.actor }}</span>
                </div>
                <table>
                  <tr><th>Stage</th><th>Test Suite</th><th>Status</th></tr>
                  <tr><td class="env-name">🟢 DEV</td><td class="test-type">Sanity (@sanity)</td><td class="status">${{ steps.status.outputs.dev }}</td></tr>
                  <tr><td class="env-name">🔵 QA</td><td class="test-type">All Tests</td><td class="status">${{ steps.status.outputs.qa }}</td></tr>
                  <tr><td class="env-name">🟡 STAGE</td><td class="test-type">Regression (@regression)</td><td class="status">${{ steps.status.outputs.stage }}</td></tr>
                  <tr><td class="env-name">🔴 PROD</td><td class="test-type">Smoke (@smoke)</td><td class="status">${{ steps.status.outputs.prod }}</td></tr>
                </table>
              </div>
              <div class="reports">
                <h3>📊 View Reports (Click to Open)</h3>
                <a class="report-link" href="${REPORT_URL}/index.html">📁 All Reports Dashboard</a>
                <a class="report-link green" href="${REPORT_URL}/qa-html/index.html">📊 QA HTML Report</a>
                <a class="report-link green" href="${REPORT_URL}/qa-allure/index.html">📈 QA Allure Report</a>
              </div>
              <div class="footer">
                Playwright Framework | $(date +'%d %b %Y, %I:%M %p UTC')
              </div>
            </div>
          </body>
          </html>
          DASHBOARD

      - name: Send Email with Dashboard
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.hostinger.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🎭 CI/CD Pipeline — ${{ steps.status.outputs.overall }} — ${{ github.ref_name }}"
          to: onkar.undale@gmail.com
          from: "CI Bot <${{ secrets.EMAIL_USERNAME }}>"
          html_body: file://dashboard.html

      - name: Send Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🎭 Playwright CI/CD Pipeline Report" }
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Overall: ${{ steps.status.outputs.overall }}*\n\n*Branch:* `${{ github.ref_name }}`  |  *Triggered by:* `${{ github.actor }}`" }
                },
                { "type": "divider" },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "${{ steps.status.outputs.dev }}  *DEV* — Sanity (@sanity)\n${{ steps.status.outputs.qa }}  *QA* — All Tests\n${{ steps.status.outputs.stage }}  *STAGE* — Regression (@regression)\n${{ steps.status.outputs.prod }}  *PROD* — Smoke (@smoke)" }
                },
                { "type": "divider" },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "📊 View Reports" },
                      "url": "${{ steps.status.outputs.report_url }}/index.html",
                      "style": "primary"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "📁 GitHub Actions" },
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Pipeline Summary
        run: |
          echo "═══════════════════════════════════════════"
          echo "       MASTER CI/CD PIPELINE SUMMARY"
          echo "═══════════════════════════════════════════"
          echo "  DEV Sanity:      ${{ needs.test-dev.result }}"
          echo "  QA Regression:   ${{ needs.test-qa.result }}"
          echo "  STAGE Sanity:    ${{ needs.test-stage.result }}"
          echo "  PROD Smoke:      ${{ needs.test-prod.result }}"
          echo "  Reports:         ${{ steps.status.outputs.report_url }}/index.html"
          echo "═══════════════════════════════════════════"
